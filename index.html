<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR 길찾기 - 서정대학교</title>
    <!-- A-Frame 및 AR.js 라이브러리 로드 -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- AR 화면 렌더링 씬 설정 -->
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
    >
      <!-- 1. 사용자의 현재 위치를 추적하는 GPS 카메라 -->
      <!-- rotation-reader: 스마트폰의 자이로센서를 읽어 방향을 파악합니다 -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- 2. 도착지 (본관) 설정 -->
      <!-- 테스트를 위해 아래 위도(latitude), 경도(longitude)를 현재 계신 곳의 좌표로 변경해보세요 -->
      <a-entity gps-entity-place="latitude: 37.8188; longitude: 127.0655;">
        
        <!-- 깔끔한 네이비색 데이터보드 스타일 안내 패널 -->
        <!-- 참고: A-Frame 기본 텍스트는 영문만 지원하므로, 실무 적용 시 한글 폰트 변환 파일이 필요합니다 -->
        <a-plane color="#1A365D" width="3" height="1" position="0 2.5 0" opacity="0.9">
            <a-text value="Main Building" align="center" color="#FFFFFF" scale="1.5 1.5 1.5"></a-text>
            <a-text value="Dept. Administration" align="center" color="#94A3B8" position="0 -0.3 0" scale="0.8 0.8 0.8"></a-text>
        </a-plane>

        <!-- 길안내를 돕는 직관적인 3D 화살표 도형 (원뿔 형태) -->
        <a-cone color="#E2E8F0" radius-bottom="0.5" height="1.5" position="0 0.5 0" rotation="0 0 180" opacity="0.8"></a-cone>

      </a-entity>
    </a-scene>
  </body>
</html>
